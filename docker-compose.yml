services:
    nginx :
        container_name : nginx
        build: ./srcs/requirement/nginix
        ports:
            - "443"
        depends_on:
            - wordpress
        networks:
            - inception
    wordpress:
        container_name : wordpress
        build : ./srcs/requirement/wordpress
        ports :
            - "9000"
        depends_on:
            - mariadb
        volumes :
            - wp_vol:/home/slimane/data/wp
        networks:
            - inception
    mariadb :
        container_name : mariadb
        build : ./srcs/requirement/mariadb
        ports :
            - "3306"
        volumes :
            - db_vol:/home/slimane/data/db
        networks:
            - inception
networks:
    inception:
        driver: bridge
volumes :
    db_vol:
    wp_vol:
        driver: local 
        driver_opts:
            type: none
            o: bind   
            device: /home/slimane/data/wp
            
